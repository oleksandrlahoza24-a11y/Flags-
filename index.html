<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instant GIF Roller</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0f0f0f;
            color: white;
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden;
        }

        #gif-container {
            width: 90vw;
            height: 60vh;
            max-width: 600px;
            background: #1a1a1a;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 3px solid #333;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 18px 35px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-roll {
            background: linear-gradient(135deg, #ff0080, #7928ca);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 0, 128, 0.4);
        }

        .btn-cat {
            background: linear-gradient(135deg, #0070f3, #00dfd8);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 112, 243, 0.4);
        }

        button:active {
            transform: scale(0.92);
        }

        #loading {
            display: none;
            font-size: 18px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="gif-container">
        <div id="placeholder">Tap a button to roll!</div>
        <img id="gif-img" style="display:none;">
    </div>

    <div id="loading">Loading...</div>

    <div class="controls">
        <button class="btn-roll" onclick="rollAny()">ANY GIF</button>
        <button class="btn-cat" onclick="rollCat()">RANDOM CAT</button>
    </div>

    <script>
        // A curated list of direct GIF links to ensure it works without an API
        const gifLibrary = [
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamN3bm1yeGR3eXh6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxxTQH991gk/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamN3bm1yeGR3eXh6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l41lTfuxV5l6pP50k/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamN3bm1yeGR3eXh6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/26gsjCZpPolPr3sBy/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamN3bm1yeGR3eXh6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKSjPjXGvH7a2yA/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamN3bm1yeGR3eXh6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/l0HlSno8ZvgS2J6G4/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamN3bm1yeGR3eXh6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o6Zt481isf9KfXY9a/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJwamN3bm1yeGR3eXh6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxxTQH991gk/giphy.gif",
            "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXNoNjB5ZXR6dzh0dzZ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/sIIhZmxQX2fAY/giphy.gif",
            "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXNoNjB5ZXR6dzh0dzZ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/cuPm4A4pUR9o4/giphy.gif",
            "https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXNoNjB5ZXR6dzh0dzZ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6eXJ6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/JIX9t2j0ZTN9S/giphy.gif"
        ];

        const img = document.getElementById('gif-img');
        const placeholder = document.getElementById('placeholder');
        const loading = document.getElementById('loading');

        function showGif(url) {
            placeholder.style.display = 'none';
            img.style.display = 'none';
            loading.style.display = 'block';

            // Create new image to handle loading
            const newImg = new Image();
            newImg.src = url;
            newImg.onload = function() {
                img.src = url;
                img.style.display = 'block';
                loading.style.display = 'none';
            };
        }

        // Rolls a random GIF from the hardcoded list
        function rollAny() {
            const randomIndex = Math.floor(Math.random() * gifLibrary.length);
            showGif(gifLibrary[randomIndex]);
        }

        // Fetches a fresh random cat GIF from Cataas (No API key needed)
        function rollCat() {
            // Adding a timestamp prevents the browser from caching the same cat
            const catUrl = "https://cataas.com/cat/gif?t=" + new Date().getTime();
            showGif(catUrl);
        }

        // Prevent iPad double-tap zoom
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
